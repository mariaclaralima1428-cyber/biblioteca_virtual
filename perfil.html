<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca — Perfil do Leitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Lato', sans-serif;
        }

        body {
            background-color: #b79983;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #fff;
        }

        /* ════════ TOPBAR ════════ */
        #topbar {
            background-color: #673a23;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px; /* Ajustado de 42px 80px para melhor equilíbrio */
            width: 100%;
            min-height: 60px;
        }

        .topbar-logo img {
            height: auto;
            max-height: 50px; /* Evita que o logo quebre o cabeçalho */
            cursor: pointer;
        }

        .btn-voltar {
            background: #8b6246;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            white-space: nowrap;
        }

        .btn-voltar:hover {
            background: #a17353;
        }

        /* ════════ LAYOUT CONTAINER ════════ */
        .profile-container {
            display: flex;
            flex: 1;
            width: 100%;
            max-width: 1400px; /* Limita o tamanho em telas ultra-wides */
            margin: 0 auto;
        }

        /* Coluna Esquerda: Informações principais e Reservas */
        .main-profile {
            flex: 2;
            padding: 40px;
            background-color: #b79983;
        }

        /* Coluna Direita: Avaliações do usuário */
        .sidebar-reviews {
            flex: 1;
            padding: 40px;
            background-color: #8e6c55;
            border-top-left-radius: 25px;
        }

        /* ════════ COMPONENTES DE USUÁRIO ════════ */
        .user-header-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar-wrap {
            position: relative;
            width: 120px;
            height: 120px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            background-color: #8b6246;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-wrap:hover::after {
            content: "Alterar Foto";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        #file-input {
            display: none;
        }

        .user-info-text .role-title {
            font-size: 14px;
            text-transform: lowercase;
            opacity: 0.9;
        }

        .user-info-text .username-display {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: -4px;
            word-break: break-word; /* Evita que nicks gigantes quebrem a tela */
        }

        .bio-area {
            margin-bottom: 40px;
            max-width: 500px;
        }

        .bio-text {
            font-style: italic;
            opacity: 0.85;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .bio-text:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .bio-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: white;
            padding: 8px;
            border-radius: 5px;
            display: none;
            font-size: 16px;
        }

        /* ════════ SEÇÕES E CARDS DE LIVROS ════════ */
        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        /* Grid/Flex layouts para os cards */
        .books-horizontal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* Grid fluida automática */
            gap: 20px;
        }

        .books-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .book-card-profile {
            width: 100%; /* Ocupa o espaço estipulado pela Grid */
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .book-card-profile:hover {
            transform: translateY(-5px);
        }

        .book-cover-box {
            width: 100%;
            max-width: 120px;
            height: 170px;
            margin: 0 auto 8px auto;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #cde3f7 0%, #a2c6e8 100%);
            position: relative;
        }

        .book-cover-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Layout de nuvem/paisagem simulando o placeholder da imagem quando não há capa */
        .placeholder-cover {
            text-align: center;
            color: #7290b0;
            padding: 10px;
            font-size: 11px;
        }

        .placeholder-cover::before {
            content: "☁️";
            font-size: 32px;
            display: block;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .book-stars {
            color: #e8c99a;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .book-title-text {
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-tag {
            font-size: 11px;
            background: #8b6246;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }

        /* Card da barra lateral (Avaliações) */
        .review-row-card {
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.1);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .review-row-card .book-cover-box {
            width: 70px;
            height: 100px;
            margin: 0;
            flex-shrink: 0;
        }

        .review-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
            flex: 1;
            min-width: 0; /* Permite o text-overflow funcionar dentro do flexbox */
        }

        .review-comment {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
            font-style: italic;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        p.empty-msg {
            opacity: 0.7;
            font-style: italic;
            font-size: 14px;
        }

        /* ════════ MEDIA QUERIES (RESPONSIVIDADE) ════════ */
        
        /* Tablets e Telas Médias */
        @media (max-width: 992px) {
            .profile-container {
                flex-direction: column; /* Empilha a barra lateral abaixo do conteúdo principal */
            }

            .sidebar-reviews {
                border-top-left-radius: 25px;
                border-top-right-radius: 25px; /* Arredonda ambos os lados no mobile */
            }
        }

        /* Celulares e Telas Pequenas */
        @media (max-width: 600px) {
            #topbar {
                padding: 15px 20px;
            }

            .topbar-logo img {
                max-height: 40px;
            }

            .btn-voltar {
                padding: 6px 12px;
                font-size: 14px;
            }

            .main-profile, .sidebar-reviews {
                padding: 20px; /* Reduz espaçamento interno em telas pequenas */
            }

            .user-header-area {
                flex-direction: column; /* Alinha avatar e texto verticalmente no celular */
                text-align: center;
                gap: 15px;
            }

            .review-info .book-title-text {
                white-space: normal; /* Permite que o título quebre linha se for muito grande no mobile */
            }

            .books-horizontal-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); /* Cards ligeiramente menores no celular */
            }
        }
    </style>
</head>

<body>

    <header id="topbar">
        <div class="topbar-logo">
            <img src="logo.png" alt="Logo" onclick="window.location.href='homeus.html'">
        </div>
        <button class="btn-voltar" onclick="window.location.href='homeus.html'">Voltar ao Acervo</button>
    </header>

    <div class="profile-container">

        <main class="main-profile">
            <div class="user-header-area">
                <div class="avatar-wrap" onclick="triggerFileUpload()">
                    <div id="avatar-target" class="avatar-img"></div>
                    <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                <div class="user-info-text">
                    <div class="role-title">leitor</div>
                    <div id="username-title" class="username-display">FULANINHA123</div>
                </div>
            </div>

            <div class="bio-area">
                <p id="bio-display" class="bio-text" onclick="enableBioEdit()">Clique para adicionar uma biografia...
                </p>
                <input type="text" id="bio-edit-input" class="bio-input" onblur="saveBioEdit()"
                    onkeydown="if(event.key==='Enter') saveBioEdit()">
            </div>

            <section>
                <h2 class="section-title">Livros reservados</h2>
                <div id="reservas-grid" class="books-horizontal-grid">
                </div>
            </section>
        </main>

        <aside class="sidebar-reviews">
            <h2 class="section-title">Avaliação dos livros</h2>
            <div id="avaliacoes-stack" class="books-vertical-stack">
            </div>
        </aside>

    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let currentUsername = localStorage.getItem('username') || 'FULANINHA123';
        let userBio = '';
        let userPhotoBase64 = '';

        const defaultAvatarSVG = `
    <svg width="60" height="60" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" fill="#8b6246"/>
      <circle cx="14" cy="11" r="5" fill="#e8c99a"/>
      <ellipse cx="14" cy="23" rx="8" ry="4.5" fill="#e8c99a"/>
    </svg>`;

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('username-title').textContent = currentUsername.toUpperCase();
            loadProfileData();
        });

        async function loadProfileData() {
            try {
                const res = await fetch(`${API}/perfil/${currentUsername}`);
                const data = await res.json();

                userBio = data.user.bio || 'Clique para adicionar uma biografia...';
                userPhotoBase64 = data.user.foto_perfil || '';

                document.getElementById('bio-display').textContent = userBio;
                renderAvatar();

                const reservasGrid = document.getElementById('reservas-grid');
                if (data.reservas && data.reservas.length > 0) {
                    reservasGrid.innerHTML = data.reservas.map(b => `
                  <div class="book-card-profile" onclick="window.location.href='detalhe.html?id=${b.id}'">
                      <div class="book-cover-box">
                          ${b.capa_url ? `<img src="${b.capa_url}" alt="${b.titulo}">` : `<div class="placeholder-cover"></div>`}
                      </div>
                      <div class="book-stars">${'★'.repeat(Math.round(b.media_avaliacao || 5))}${'☆'.repeat(5 - Math.round(b.media_avaliacao || 5))}</div>
                      <div class="book-title-text">${b.titulo}</div>
                      <span class="status-tag">${b.status}</span>
                  </div>
              `).join('');
                } else {
                    reservasGrid.innerHTML = '<p class="empty-msg">Nenhum livro reservado no momento.</p>';
                }

                const avaliacoesStack = document.getElementById('avaliacoes-stack');
                if (data.avaliacoes && data.avaliacoes.length > 0) {
                    avaliacoesStack.innerHTML = data.avaliacoes.map(b => `
                  <div class="review-row-card" onclick="window.location.href='detalhe.html?id=${b.id}'">
                      <div class="book-cover-box">
                          ${b.capa_url ? `<img src="${b.capa_url}" alt="${b.titulo}">` : `<div class="placeholder-cover"></div>`}
                      </div>
                      <div class="review-info">
                          <div class="book-title-text" style="text-align:left;">${b.titulo}</div>
                          <div class="book-stars" style="text-align:left;">${'★'.repeat(b.nota)}${'☆'.repeat(5 - b.nota)}</div>
                          ${b.comentario ? `<div class="review-comment">${b.comentario}</div>` : ''}
                      </div>
                  </div>
              `).join('');
                } else {
                    avaliacoesStack.innerHTML = '<p class="empty-msg">Você ainda não avaliou nenhum livro.</p>';
                }

            } catch (err) {
                console.error("Erro ao carregar dados do perfil:", err);
            }
        }

        function renderAvatar() {
            const target = document.getElementById('avatar-target');
            if (userPhotoBase64) {
                target.innerHTML = `<img src="${userPhotoBase64}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            } else {
                target.innerHTML = defaultAvatarSVG;
            }
        }

        function triggerFileUpload() {
            document.getElementById('file-input').click();
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onloadend = async function () {
                userPhotoBase64 = reader.result;
                renderAvatar();
                await syncProfileToServer();
            };
            reader.readAsDataURL(file);
        }

        function enableBioEdit() {
            const display = document.getElementById('bio-display');
            const input = document.getElementById('bio-edit-input');

            input.value = userBio === 'Clique para adicionar uma biografia...' ? '' : userBio;
            display.style.display = 'none';
            input.style.display = 'block';
            input.focus();
        }

        async function saveBioEdit() {
            const display = document.getElementById('bio-display');
            const input = document.getElementById('bio-edit-input');

            const newValue = input.value.trim();
            userBio = newValue || 'Clique para adicionar uma biografia...';

            display.textContent = userBio;
            input.style.display = 'none';
            display.style.display = 'block';

            await syncProfileToServer();
        }

        async function syncProfileToServer() {
            try {
                await fetch(`${API}/perfil/atualizar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUsername,
                        bio: userBio,
                        foto_perfil: userPhotoBase64
                    })
                });
            } catch (err) {
                console.error("Erro ao salvar dados no servidor:", err);
            }
        }
    </script>
</body>

</html>
